name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build IRIS macOS
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest available)
        run: sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install Tuist via Homebrew
        run: |
          brew install --quiet tuist || true
          tuist version

      - name: Tuist install (dependencies)
        run: tuist install

      - name: Tuist generate (no open)
        run: tuist generate --no-open

      - name: xcodebuild (Debug, macOS)
        # NB : un seul run, log complet capturé puis filtré sur errors/warnings (avant : `| tail -50` tronquait les `error:` Swift)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace IRIS.xcworkspace \
            -scheme IRIS \
            -destination 'platform=macOS' \
            -configuration Debug \
            build 2>&1 | tee /tmp/xcb-build.log | grep -E "(error:|warning:|BUILD)" | tail -200 || true
          # Propagate exit code from the actual xcodebuild via pipefail+tee — last command of pipeline is grep which exits 0/1.
          # On extrait BUILD result depuis le log :
          if grep -q "\*\* BUILD SUCCEEDED \*\*" /tmp/xcb-build.log; then
            echo "Build OK"
          else
            echo "Build FAILED — derniers errors :"
            grep -E "error:" /tmp/xcb-build.log | tail -50
            exit 1
          fi

      - name: xcodebuild test (IRISTests) — STRICT (v1.0+)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace IRIS.xcworkspace \
            -scheme IRIS \
            -destination 'platform=macOS' \
            -configuration Debug \
            test 2>&1 | tee /tmp/xcb-test.log | grep -E "(error:|warning:|Test |passed|failed|XCTAssert|FAIL)" | tail -200 || true
          if grep -q "\*\* TEST SUCCEEDED \*\*" /tmp/xcb-test.log; then
            echo "Tests OK"
          else
            echo "Tests FAILED — derniers errors :"
            grep -E "(error:|XCTAssert|FAIL)" /tmp/xcb-test.log | tail -50
            exit 1
          fi

  lint:
    name: Markdown lint (docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vérifier que les .md ont une heading H1
        run: |
          set -e
          for f in docs/*.md artefacts/*.md README.md; do
            if [ -f "$f" ]; then
              if ! head -5 "$f" | grep -q "^# "; then
                echo "::warning file=$f::Missing H1 heading in first 5 lines"
              fi
            fi
          done
          echo "Docs OK"
